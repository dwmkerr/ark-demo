{{- if .Values.demos.openaiResponses }}
{{- if not .Values.models.openai.enabled }}
{{- fail "demos.openaiResponses=true requires models.openai.enabled=true (supplies gpt-5-4 model + openai-api-key secret)" }}
{{- end }}
{{- if not .Values.models.openai.apiKey }}
{{- fail "demos.openaiResponses=true requires models.openai.apiKey to be set" }}
{{- end }}
---
# website-search-agent — OpenAI built-in web_search_preview tool, UK location context.
apiVersion: ark.mckinsey.com/v1alpha1
kind: Agent
metadata:
  name: website-search-agent
  annotations:
    executor-openai-responses.ark.mckinsey.com/reasoning: '{"effort": "low"}'
    executor-openai-responses.ark.mckinsey.com/tools: |
      [
        {
          "type": "web_search_preview",
          "user_location": {
            "type": "approximate",
            "country": "GB",
            "city": "London",
            "region": "London"
          }
        }
      ]
spec:
  modelRef:
    name: gpt-5-4
  executionEngine:
    name: executor-openai-responses
  prompt: |
    You are an expert web search agent located in UK.
    Your role is to find the link to the main website of a given company located in UK.
    Return only the link and nothing else. Do not write any comments or explanation.
---
apiVersion: ark.mckinsey.com/v1alpha1
kind: Query
metadata:
  name: find-adam-grooming
spec:
  target:
    type: agent
    name: website-search-agent
  input: "ADAM GROOMING BN LTD"
---
# company-lookup-agent — web_search_preview + JSON-schema constrained output.
apiVersion: ark.mckinsey.com/v1alpha1
kind: Agent
metadata:
  name: company-lookup-agent
  annotations:
    executor-openai-responses.ark.mckinsey.com/reasoning: '{"effort": "low"}'
    executor-openai-responses.ark.mckinsey.com/tools: |
      [
        {
          "type": "web_search_preview",
          "user_location": {
            "type": "approximate",
            "country": "GB",
            "city": "London",
            "region": "London"
          }
        }
      ]
    executor-openai-responses.ark.mckinsey.com/output-schema: |
      {
        "type": "object",
        "properties": {
          "company_name": {
            "type": "string",
            "description": "Official registered company name"
          },
          "website_url": {
            "type": "string",
            "description": "Primary company website URL"
          },
          "companies_house_number": {
            "type": "string",
            "description": "UK Companies House registration number, or null if not a UK company"
          },
          "registered_address": {
            "type": "string",
            "description": "Official registered address of the company"
          },
          "company_status": {
            "type": "string",
            "description": "Current company status, e.g. Active, Dissolved, In Administration"
          }
        },
        "required": ["company_name", "website_url", "companies_house_number", "registered_address", "company_status"],
        "additionalProperties": false
      }
spec:
  modelRef:
    name: gpt-5-4
  executionEngine:
    name: executor-openai-responses
  prompt: |
    You are a company research assistant located in the UK.
    Given a company name, search the web to find accurate, up-to-date information
    and return it as structured data. Always search for:
    1. The official registered company name
    2. The primary website URL
    3. The UK Companies House registration number (if it is a UK-registered company)
    4. The official registered address
    5. The current company status (Active, Dissolved, etc.)
    If any field cannot be found, set it to null. Always verify via web search.
---
apiVersion: ark.mckinsey.com/v1alpha1
kind: Query
metadata:
  name: company-lookup-query
spec:
  target:
    type: agent
    name: company-lookup-agent
  input: "ADAM GROOMING BN LTD"
---
# sql-generator-agent — CFG (Lark grammar) constraining output to valid PostgreSQL SELECT.
apiVersion: ark.mckinsey.com/v1alpha1
kind: Agent
metadata:
  name: sql-generator-agent
  annotations:
    executor-openai-responses.ark.mckinsey.com/reasoning: '{"effort": "low"}'
    executor-openai-responses.ark.mckinsey.com/tools: |
      [
        {
          "type": "custom",
          "name": "generate_sql",
          "description": "Generate a valid read-only PostgreSQL SELECT query constrained by grammar",
          "format": {
            "type": "grammar",
            "syntax": "lark",
            "definition": "SP: \" \"\nCOMMA: \",\"\nGT: \">\"\nLT: \"<\"\nEQ: \"=\"\nSEMI: \";\"\n\nstart: \"SELECT\" SP select_list SP \"FROM\" SP table where_clause? order_clause? limit_clause SEMI\n\nselect_list: \"*\" | column (COMMA SP column)*\ncolumn: IDENTIFIER\n\ntable: IDENTIFIER\n\nwhere_clause: SP \"WHERE\" SP condition (SP \"AND\" SP condition)*\ncondition: IDENTIFIER SP op SP value\nop: GT | LT | EQ | \">=\" | \"<=\"  | \"!=\"\nvalue: NUMBER | QUOTED_STRING\n\norder_clause: SP \"ORDER\" SP \"BY\" SP IDENTIFIER SP (\"ASC\" | \"DESC\")\nlimit_clause: SP \"LIMIT\" SP NUMBER\n\nIDENTIFIER: /[A-Za-z_][A-Za-z0-9_]*/\nNUMBER: /[0-9]+/\nQUOTED_STRING: /\\'[^']*\\'/\n"
          }
        }
      ]
spec:
  modelRef:
    name: gpt-5-4
  executionEngine:
    name: executor-openai-responses
  prompt: |
    You are a SQL query generator. Given a natural language request, generate a
    valid PostgreSQL SELECT query using the generate_sql tool.
    Only SELECT queries are allowed — no INSERT, UPDATE, DELETE, or DDL.
    Always use the generate_sql tool to return your query.
---
apiVersion: ark.mckinsey.com/v1alpha1
kind: Query
metadata:
  name: sql-query-request
spec:
  target:
    type: agent
    name: sql-generator-agent
  input: "Get the top 10 orders from the orders table where total_amount > 500, ordered by order_date descending"
---
# dsl-generator-agent — CFG-constrained functional pipeline DSL.
apiVersion: ark.mckinsey.com/v1alpha1
kind: Agent
metadata:
  name: dsl-generator-agent
  annotations:
    executor-openai-responses.ark.mckinsey.com/reasoning: '{"effort": "low"}'
    executor-openai-responses.ark.mckinsey.com/tools: |
      [
        {
          "type": "custom",
          "name": "generate_pipeline",
          "description": "Generate a valid functional pipeline DSL expression constrained by grammar",
          "format": {
            "type": "grammar",
            "syntax": "lark",
            "definition": "PIPE: \" | \"\nCOMMA: \", \"\nLP: \"(\"\nRP: \")\"\nEQ: \" = \"\n\nstart: source (PIPE operation)+\n\nsource: IDENTIFIER\n\noperation: filter_op | select_op | map_op | sort_op | limit_op | group_op | count_op\n\nfilter_op: \"filter\" LP condition RP\ncondition: IDENTIFIER SP cmp_op SP value\ncmp_op: \">\" | \"<\" | \">=\" | \"<=\" | \"==\" | \"!=\"\nvalue: NUMBER | QUOTED_STRING | IDENTIFIER\n\nselect_op: \"select\" LP IDENTIFIER (COMMA IDENTIFIER)* RP\n\nmap_op: \"map\" LP mapping (COMMA mapping)* RP\nmapping: IDENTIFIER EQ expr\nexpr: IDENTIFIER | NUMBER | IDENTIFIER SP arith SP (IDENTIFIER | NUMBER)\narith: \"+\" | \"-\" | \"*\" | \"/\"\n\nsort_op: \"sort\" LP IDENTIFIER COMMA order RP\norder: \"asc\" | \"desc\"\n\nlimit_op: \"limit\" LP NUMBER RP\n\ngroup_op: \"group\" LP IDENTIFIER RP\n\ncount_op: \"count\" LP RP\n\nSP: \" \"\nIDENTIFIER: /[a-z_][a-z0-9_]*/\nNUMBER: /[0-9]+/\nQUOTED_STRING: /\\'[^']*\\'/\n"
          }
        }
      ]
spec:
  modelRef:
    name: gpt-5-4
  executionEngine:
    name: executor-openai-responses
  prompt: |
    You are a DSL pipeline generator. Given a natural language data transformation
    request, generate a valid pipeline expression using the generate_pipeline tool.

    The pipeline DSL works as follows:
    - Start with a source table name
    - Chain operations with |
    - Available operations: filter, select, map, sort, limit, group, count

    Always use the generate_pipeline tool to return your expression.
---
apiVersion: ark.mckinsey.com/v1alpha1
kind: Query
metadata:
  name: dsl-query-request
spec:
  target:
    type: agent
    name: dsl-generator-agent
  input: "From the users table, keep only active users, show their id and email, sorted by created_at descending, top 20"
---
# companies-house-agent — MCP tool example.
# Requires: ark install marketplace/mcps/companies-house-mcp
apiVersion: ark.mckinsey.com/v1alpha1
kind: Agent
metadata:
  name: companies-house-agent
  annotations:
    executor-openai-responses.ark.mckinsey.com/reasoning: '{"effort": "low"}'
spec:
  modelRef:
    name: gpt-5-4
  executionEngine:
    name: executor-openai-responses
  tools:
    - type: custom
      name: mcp-companies-house-get-uk-company-number
    - type: custom
      name: mcp-companies-house-get-uk-person-in-control
  prompt: |
    You are a UK company research assistant with access to the official Companies House API.
    Use the available tools to look up company registration numbers and persons with
    significant control. Always use the tools to retrieve live data rather than relying
    on training knowledge.
---
apiVersion: ark.mckinsey.com/v1alpha1
kind: Query
metadata:
  name: companies-house-query
spec:
  target:
    type: agent
    name: companies-house-agent
  input: "Find the company number and persons with significant control for ADAM GROOMING BN LTD"
{{- end }}
