# Values for the ark-demo chart in the Terraform-managed demo environment.
# The chart ships no values.yaml, so this supplies the full structure. API keys
# are injected separately via set_sensitive (from model_api_keys), so they stay
# out of version control. Providers/MCP servers needing extra secrets or config
# are disabled to keep the CI install self-contained.
models:
  anthropic:
    enabled: true
    apiKey: "" # injected via set_sensitive
    baseUrl: "https://api.anthropic.com/v1/"
    models:
      # NOTE: the claude-3-5-*-20241022 snapshots are retired at Anthropic and
      # 404 the model probe. Use current Claude 4 ids. claude-opus-4-20250514 is
      # verified Available against this endpoint.
      #
      # 'default' is the model agents fall back to (planner, team-leader,
      # lead-software-engineer all reference it).
      - name: default
        model: claude-opus-4-20250514
      - name: claude-sonnet-4
        model: claude-sonnet-4-20250514
      # Referenced by the code-reviewer agent.
      - name: claude-4-opus
        model: claude-opus-4-20250514

  # Disabled for now — using anthropic keys only. Re-enable with valid keys.
  gemini:
    enabled: false
    apiKey: ""
    baseUrl: "https://generativelanguage.googleapis.com/v1beta/openai/"
    models: []

  azureOpenAI:
    enabled: false
    apiKey: ""
    models: []

  openai:
    enabled: false
    apiKey: ""
    models: []

  bedrock:
    enabled: false

# MCP servers off by default: shell/shellwright/aiDeveloperGuide pull subcharts,
# github needs a token. Enable selectively once the base demo is verified.
mcpServers:
  shell:
    enabled: false
  github:
    enabled: false
  shellwright:
    enabled: false
  aiDeveloperGuide:
    enabled: false
  awsKnowledge:
    enabled: false
  microsoftLearn:
    enabled: false
