name: terraform-apply

on:
  # Manual trigger for on-demand rebuilds (e.g. after a terraform-destroy).
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-*.yml"

permissions:
  id-token: write
  contents: read

env:
  TF_WORKDIR: terraform/environments/demo
  TF_VAR_model_api_keys: ${{ secrets.MODEL_API_KEYS_JSON }}
  # GitHub SSO (Dex). enable_sso/demo_users are repo variables; OAuth creds are secrets.
  TF_VAR_enable_sso: ${{ vars.ENABLE_SSO }}
  TF_VAR_demo_users: ${{ vars.DEMO_USERS_JSON }}
  TF_VAR_github_oauth_client_id: ${{ secrets.GH_OAUTH_CLIENT_ID }}
  TF_VAR_github_oauth_client_secret: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
  # Optional ark-dashboard image override (e.g. a fork build for issue #2318).
  TF_VAR_dashboard_image_repository: ${{ vars.DASHBOARD_IMAGE_REPOSITORY }}
  TF_VAR_dashboard_image_tag: ${{ vars.DASHBOARD_IMAGE_TAG }}
  TF_VAR_ark_api_image_repository: ${{ vars.ARK_API_IMAGE_REPOSITORY }}
  TF_VAR_ark_api_image_tag: ${{ vars.ARK_API_IMAGE_TAG }}
  TF_VAR_ark_chart_registry: ${{ vars.ARK_CHART_REGISTRY }}
  TF_VAR_ark_chart_version: ${{ vars.ARK_CHART_VERSION }}

jobs:
  # Runs immediately and unguarded so the plan is visible BEFORE approval. The
  # saved plan is handed to the apply job, so apply runs exactly what you review.
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKDIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      # Build the ark-demo chart's OCI dependencies; the helm provider can't.
      - uses: azure/setup-helm@v4
      - run: helm dependency update ../../../chart

      - run: terraform init

      - run: terraform plan -out=tfplan -input=false

      - name: Plan summary
        run: |
          {
            echo '```'
            terraform show -no-color tfplan
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKDIR }}/tfplan
          retention-days: 1

  apply:
    needs: plan
    runs-on: ubuntu-latest
    # 'demo' environment carries the required-reviewer gate. Review the plan
    # job above, then approve here. Apply uses the saved plan — no surprises.
    environment: demo
    defaults:
      run:
        working-directory: ${{ env.TF_WORKDIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - uses: azure/setup-helm@v4
      - run: helm dependency update ../../../chart

      - run: terraform init

      - uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKDIR }}

      - run: terraform apply -input=false tfplan
